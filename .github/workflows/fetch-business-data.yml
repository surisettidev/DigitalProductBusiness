name: Fetch Business Data Snapshot

# Triggered manually by the daily agent via the GitHub API (workflow_dispatch),
# or runs automatically every morning at 3:00 AM UTC (8:30 AM IST) as a backup.
#
# WHY THIS EXISTS:
# GitHub Secrets are write-only — no API can read them back, including the
# daily agent's PAT. This workflow runs INSIDE GitHub's infrastructure where
# secrets are injected as env vars, calls the real APIs, and writes only the
# RESULTS (not the secrets) to a file the daily agent can safely read.
#
# 2026-06-21 — RESILIENCE PATCH (PR opened by daily-agent v3.2 on its own
# first-run failure mode):
#   The previous "Commit snapshot" step pushed straight to `main`. Branch
#   protection on `main` rejects every such push (`remote: error: GH006:
#   Protected branch update failed for refs/heads/main`), so the snapshot
#   file never landed and the closed-loop agent had nothing to read.
#
#   Until the owner either (a) allow-lists `github-actions[bot]` on
#   protected `main` for the single path `daily-operations/live-data-snapshot.json`,
#   or (b) adds a PAT with admin-bypass as `WORKFLOW_PUSH_TOKEN` secret,
#   we do TWO defensive things here:
#     1. Always upload the snapshot as a workflow artifact (`live-data-snapshot`)
#        so the daily agent can pull it via the Actions API even when the
#        push to main is rejected.
#     2. Keep the push attempt, but mark it `continue-on-error: true` so the
#        workflow finishes green and downstream automation isn't blocked
#        by what is essentially a permissions issue, not a data issue.
#   If the owner later configures push permissions, no further code change
#   is needed — the existing push step will simply start succeeding.

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Who/what triggered this run'
        required: false
        default: 'manual'
  schedule:
    - cron: '0 3 * * *'  # 3:00 AM UTC = 8:30 AM IST daily, backup safety net

permissions:
  contents: write

jobs:
  fetch-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        run: npm install --prefix .github/scripts

      - name: Fetch GA4 data
        id: ga4
        continue-on-error: true
        env:
          GOOGLE_ANALYTICS_KEY_JSON: ${{ secrets.GOOGLE_ANALYTICS_KEY_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: node .github/scripts/fetch-ga4.js

      - name: Fetch Clarity data
        id: clarity
        continue-on-error: true
        env:
          CLARITY_API_TOKEN: ${{ secrets.CLARITY_API_TOKEN }}
        run: node .github/scripts/fetch-clarity.js

      - name: Fetch Razorpay orders
        id: razorpay
        continue-on-error: true
        env:
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
        run: node .github/scripts/fetch-razorpay.js

      - name: Fetch Brevo stats
        id: brevo
        continue-on-error: true
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: node .github/scripts/fetch-brevo.js

      - name: Merge into snapshot
        run: node .github/scripts/merge-snapshot.js

      # Always-available read path: workflow artifact. The daily agent can
      # GET /repos/.../actions/runs/<id>/artifacts and download `live-data-snapshot`
      # even if the commit-to-main step below is rejected by branch protection.
      - name: Upload snapshot as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-data-snapshot
          path: daily-operations/live-data-snapshot.json
          if-no-files-found: warn
          retention-days: 14

      # Best-effort: try to push to main. Will fail until owner removes branch
      # protection for this specific path or supplies a PAT with admin bypass.
      # continue-on-error so the overall workflow stays green and the artifact
      # path above remains usable.
      - name: Commit snapshot (best-effort, may be blocked by branch protection)
        continue-on-error: true
        env:
          PUSH_TOKEN: ${{ secrets.WORKFLOW_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "business-data-bot"
          git config user.email "actions@github.com"
          echo "--- Snapshot file exists? ---"
          ls -la daily-operations/live-data-snapshot.json || echo "FILE NOT FOUND at daily-operations/live-data-snapshot.json"
          git add daily-operations/live-data-snapshot.json
          if git diff --staged --quiet; then
            echo "No staged changes — snapshot file may not have been written."
            exit 0
          fi
          git commit -m "data: snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ) (trigger=${{ github.event.inputs.triggered_by || 'schedule' }})"
          if ! git push "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main; then
            echo "::warning::Push to main rejected. Add WORKFLOW_PUSH_TOKEN secret (a PAT with contents:write) to bypass branch protection. Snapshot available as artifact."
            exit 1
          fi
          echo "Snapshot pushed to main successfully."
