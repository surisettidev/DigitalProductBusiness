<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — Freelancer OS</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="js/config.js"></script>
  <style>
    .success-wrap{max-width:620px;margin:0 auto;padding:60px 20px 80px;text-align:center}
    .success-check{width:78px;height:78px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#22c55e);
      display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:2.2rem;color:#fff;
      box-shadow:0 10px 30px rgba(22,163,74,.35);animation:pop .5s cubic-bezier(.2,1.6,.4,1)}
    @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
    .download-list{margin:28px 0;text-align:left}
    .download-item{display:flex;align-items:center;justify-content:space-between;gap:14px;
      background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;
      box-shadow:0 4px 14px rgba(15,23,42,.05)}
    .download-item strong{color:var(--ink);font-size:.97rem}
    .download-item .dl-btn{flex-shrink:0;background:var(--brand);color:#fff;padding:9px 18px;border-radius:8px;
      font-weight:700;font-size:.88rem;text-decoration:none;white-space:nowrap}
    .download-item .dl-btn:hover{background:var(--brand-dark);color:#fff;text-decoration:none}
    .download-item .dl-pending{flex-shrink:0;color:var(--muted);font-size:.82rem;max-width:200px;text-align:right}
    .pay-ref{font-size:.82rem;color:var(--muted);margin-top:18px}
    .pay-ref code{background:#f1f5f9;padding:2px 8px;border-radius:6px}
    .email-note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px 18px;
      font-size:.92rem;color:#1e40af;margin-top:8px}
    .fallback-note{background:#fffbeb;border:1px solid #fcd34d;border-radius:12px;padding:16px 20px;
      font-size:.92rem;color:#92400e;margin-top:8px;text-align:left}
  </style>
</head>
<body>

<header class="navbar"><div class="container"><a class="logo" href="index.html">Freelancer OS</a></div></header>

<main class="success-wrap" id="success-main">
  <div class="success-check" aria-hidden="true">✓</div>
  <h1 id="success-title">Payment successful!</h1>
  <p id="success-sub">Thanks for your purchase. Your downloads are below — we've also emailed them to you.</p>

  <section class="download-list" id="download-list" aria-label="Your downloads">
    <!-- Filled by inline script from sessionStorage -->
  </section>

  <p class="email-note" id="email-note" style="display:none"></p>
  <p class="pay-ref" id="pay-ref" style="display:none"></p>

  <p style="margin-top:30px"><a href="index.html" class="cta-btn">← Back to Freelancer OS</a></p>
</main>

<script>
(function () {
  const cfg = window.APP_CONFIG || {};
  const list = document.getElementById('download-list');
  const sub = document.getElementById('success-sub');
  const emailNote = document.getElementById('email-note');
  const payRef = document.getElementById('pay-ref');
  const support = cfg.contactEmail || 'surisetti.dev@gmail.com';

  let data = null;
  try { data = JSON.parse(sessionStorage.getItem('fos_delivery') || 'null'); } catch (_) {}

  // Only honour fresh payloads (< 1 hour) — page is useless without one
  if (!data || !data.result || (Date.now() - (data.ts || 0)) > 3600000) {
    document.getElementById('success-title').textContent = 'Check your inbox 📬';
    sub.innerHTML = 'If you just completed a payment, your download link has been emailed to you.<br>Can\'t find it? Check spam, or email <a href="mailto:' + support + '">' + support + '</a> with your payment ID.';
    list.style.display = 'none';
    return;
  }

  const r = data.result;
  const items = (r && r.items) || [];

  if (r.ok && items.length) {
    list.innerHTML = items.map(function (it) {
      if (it.url) {
        return '<div class="download-item"><strong>' + it.name + '</strong>' +
               '<a class="dl-btn" href="' + it.url + '" target="_blank" rel="noopener">Download ↓</a></div>';
      }
      return '<div class="download-item"><strong>' + it.name + '</strong>' +
             '<span class="dl-pending">Link arriving by email within a few hours</span></div>';
    }).join('');
  } else {
    // Verification failed client-side OR delivery links not ready —
    // the webhook is the backstop; the email will still arrive.
    list.innerHTML = '<div class="fallback-note"><strong>Your payment was received.</strong> ' +
      'Your download link is being emailed to ' + (data.email ? '<strong>' + data.email + '</strong>' : 'your inbox') + '. ' +
      'If it doesn\'t arrive within an hour, email <a href="mailto:' + support + '">' + support + '</a> with the payment ID below — we\'ll send it manually.</div>';
  }

  if (data.email) {
    emailNote.style.display = 'block';
    emailNote.innerHTML = '📧 A copy of your download link' + (items.length > 1 ? 's' : '') + ' was sent to <strong>' + data.email + '</strong>. Check spam if you don\'t see it in 5 minutes.';
  }

  const pid = data.paymentId || new URLSearchParams(location.search).get('pid');
  if (pid) {
    payRef.style.display = 'block';
    payRef.innerHTML = 'Payment reference: <code>' + pid + '</code> — keep this for support or refunds.';
  }
})();
</script>
<script src="js/analytics.js"></script>
</body>
</html>
