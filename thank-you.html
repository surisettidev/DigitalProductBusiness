<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in! — Freelancer OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c6dfc'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='white'>&#x26A1;</text></svg>" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style-v2.css" />
  <style>
    .thankyou-wrap {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      background: radial-gradient(ellipse at 50% 30%, rgba(124,109,252,0.12) 0%, transparent 60%), var(--bg-0);
    }
    .thankyou-card {
      max-width: 520px;
      width: 100%;
      text-align: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      padding: 48px 36px;
    }
    .thankyou-icon { font-size: 4rem; margin-bottom: 20px; display: block; animation: bounce-in 0.6s cubic-bezier(0.16,1,0.3,1); }
    @keyframes bounce-in { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .thankyou-card h1 { font-family: 'Space Grotesk', 'Inter', system-ui; font-size: 2.2rem; font-weight: 800; color: #f1f5f9; margin-bottom: 16px; letter-spacing: -0.02em; }
    .thankyou-card p { color: #94a3b8; font-size: 1rem; line-height: 1.7; margin-bottom: 16px; }
    .thankyou-card a { color: #a78bfa; }
    .thankyou-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
    .btn-primary { display: block; padding: 14px 24px; background: linear-gradient(135deg, #7c6dfc, #a78bfa); color: white; border-radius: 12px; font-weight: 700; font-size: 0.95rem; text-decoration: none; transition: transform 0.2s; }
    .btn-primary:hover { transform: translateY(-2px); color: white; }
    .btn-secondary { display: block; padding: 12px 24px; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; border-radius: 12px; font-size: 0.9rem; transition: all 0.2s; text-decoration: none; }
    .btn-secondary:hover { border-color: rgba(124,109,252,0.4); color: #f1f5f9; }
    .nav-simple { position: fixed; top: 0; left: 0; right: 0; padding: 16px 24px; display: flex; align-items: center; background: rgba(5,4,15,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); z-index: 100; }
    .nav-logo-simple { display: flex; align-items: center; gap: 8px; font-family: 'Space Grotesk', 'Inter', system-ui; font-weight: 700; color: #f1f5f9; text-decoration: none; font-size: 1.1rem; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #7c6dfc, #a78bfa); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
  </style>
</head>
<body>
  <nav class="nav-simple">
    <a href="index.html" class="nav-logo-simple">
      <span class="logo-icon">⚡</span>
      <span>Freelancer OS</span>
    </a>
  </nav>
  <div class="thankyou-wrap">
    <div class="thankyou-card">
      <span class="thankyou-icon">✅</span>
      <h1>You're in!</h1>
      <p>Your free pricing calculator is on its way to your inbox. Check your email in the next few minutes.</p>
      <p>If you don't see it in 5 minutes, check your spam folder or email <a href="mailto:surisetti.dev@gmail.com">surisetti.dev@gmail.com</a> — we'll send it manually.</p>
      <div class="thankyou-actions">
        <a href="index.html#products" class="btn-primary">Browse all products →</a>
        <a href="index.html" class="btn-secondary">← Back to home</a>
      </div>
    </div>
  </div>
</body>
</html>
